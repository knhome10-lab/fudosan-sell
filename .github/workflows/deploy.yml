name: Deploy to CORE SERVER

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            open -u knhome,${{ secrets.FTP_PASSWORD }} b1.coreserver.jp;
            mirror -R --parallel=3 --exclude=^\.git/ --exclude=^\.github/ ./ /virtual/knhome/public_html/knhome.jp/fudosan-sell/;
            quit
          "
